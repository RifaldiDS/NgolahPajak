/* ===== NgolahPajak Game Tutorial Overlay ===== */
.pajak-tour-layer{
  position:fixed;
  inset:0;
  z-index:9999;
  display:flex;
  align-items:flex-end;
  justify-content:flex-end;
  padding:24px;
  background:rgba(5,8,24,.38);
  backdrop-filter:blur(1.5px);
  animation:pajakTourDim .34s ease both;
}
.pajak-tour-layer.tour-pos-left{justify-content:flex-start;align-items:center;padding-left:clamp(18px,5vw,72px)}
.pajak-tour-layer.tour-pos-right{justify-content:flex-end;align-items:center;padding-right:clamp(18px,5vw,72px)}
.pajak-tour-layer.tour-pos-top{justify-content:center;align-items:flex-start;padding-top:78px}
.pajak-tour-layer.tour-pos-center{justify-content:center;align-items:center}
.pajak-tour-layer.tour-pos-bottom-right{justify-content:flex-end;align-items:flex-end}
.pajak-tour-wrap{
  width:min(94vw,600px);
  display:grid;
  grid-template-columns:150px minmax(0,1fr);
  align-items:end;
  gap:0;
  transform-origin:center bottom;
  animation:pajakTourPop .32s cubic-bezier(.2,.85,.22,1.12) both;
}
.tour-pos-right .pajak-tour-wrap{grid-template-columns:minmax(0,1fr) 150px}
.tour-pos-right .pajak-tour-mascot,.tour-pos-right .pajak-tour-member-avatar{order:2;margin-left:-18px;margin-right:0;transform:scaleX(-1)}
.tour-pos-top .pajak-tour-wrap,.tour-pos-center .pajak-tour-wrap,.tour-pos-bottom-right .pajak-tour-wrap{grid-template-columns:140px minmax(0,1fr)}
.pajak-tour-mascot{
  position:relative;
  z-index:2;
  width:132px;
  max-width:24vw;
  margin-right:-18px;
  filter:drop-shadow(0 16px 22px rgba(0,0,0,.26));

  pointer-events:none;

.pajak-tour-member-avatar{

  z-index:2;
  width:108px;

  margin-right:-14px;
  border-radius:28px;

  justify-content:center;

  font-weight:950;
  letter-spacing:-.04em;

  user-select:none;
  pointer-events:none;

  height:205px;

/* ===== src/utils/taxCalculator.js ===== */
const formatCurrency = (n) => {
  return "Rp\u00A0" + Math.round(n).toLocaleString("id-ID");
};

const calculateTax = (rawPrice, qty, method, taxRule) => {
  if (!rawPrice || rawPrice <= 0 || !taxRule) return null;

  const tpn = taxRule.ppn / 100;
  const tpm = taxRule.ppnbm / 100;
  const dp = taxRule.dpp / 100;
  const ht = rawPrice * qty;

  let pk, dpp, ppn, ppnbm, tot;

  if (method === "excl") {
    pk = ht;
    dpp = ht * dp;
    ppn = dpp * tpn;
    ppnbm = dpp * tpm;
    tot = ht + ppn + ppnbm;
  } else {
    const f = 1 + tpn + tpm;
    pk = ht / f;
    dpp = pk * dp;
    ppn = dpp * tpn;
    ppnbm = dpp * tpm;
    tot = ht;
  }

  const p = [];
  if (taxRule.dpp !== 100) p.push(`DPP ${taxRule.dpp}% = ${formatCurrency(dpp)}`);
  p.push(`PPN ${taxRule.ppn}% = ${formatCurrency(ppn)}`);
  if (taxRule.ppnbm > 0) p.push(`PPnBM ${taxRule.ppnbm}% = ${formatCurrency(ppnbm)}`);
  if (taxRule.ppn === 0 && taxRule.ppnbm === 0) p.push("Transaksi ini bebas PPN & PPnBM");

  return {
    pk,
    dpp,
    ppn,
    ppnbm,
    total: tot,
    notes: p.join("   ·   "),
    taxRule
  };
};

  { max:Infinity,tarif:0.34 },
]
const TER_C = [
  { max:450_000,tarif:0.00 },
  { max:2_500_000,tarif:0.005 },
  { max:Infinity,tarif:0.015 },
]

function getTerKategori(ptkpKey, tipeKaryawan) {
  if (tipeKaryawan === 'harian') return 'C'
  if (['TK0','TK1','TK2','TK3','K0'].includes(ptkpKey)) return 'A'
  return 'B'
}
function getTerTabel(kategori) {
  if (kategori === 'A') return TER_A
  if (kategori === 'B') return TER_B
  return TER_C
}

// ─────────────────────────────────────────────────────────────────
// KONSTANTA
// ─────────────────────────────────────────────────────────────────
const BIAYA_JABATAN_PCT  = 0.05
const BIAYA_JABATAN_MAX  = 6_000_000
const BIAYA_PENSIUN_PCT  = 0.05
const BIAYA_PENSIUN_MAX  = 2_400_000
const FAKTOR_NON_NPWP   = 1.20
const TARIF_PPH26        = 0.20   // WP LN tanpa P3B
const TARIF_PNS_HONOR    = 0.15   // Honorarium PNS final


/* ===== src/utils/pph21Calculator.js ===== */
/**
 * pph21Calculator.js — Logika perhitungan PPh 21 LENGKAP
 * Mencakup: TER, Progresif, Gross/Gross-Up/Net,
 *           Pensiun, Pesangon, PNS, Bukan Karyawan, PPh 26
 */
const fmtRp  = n  => 'Rp\u00A0' + Math.round(n).toLocaleString('id-ID')
const fmtPct = n  => (n * 100).toFixed(2).replace('.',',') + '%'

// ─── Tarif Progresif umum ───────────────────────────────────────
function hitungProgresif(pkp, tarifTabel = TARIF_PROGRESIF) {
  let sisa = pkp, prev = 0, pajak = 0
  const lapisan = []
  for (const l of tarifTabel) {
    if (sisa <= 0) break
    const batas = l.sampai ?? l.batas ?? Infinity
    const kena  = Math.min(sisa, batas - prev)
    const pph   = kena * l.tarif
    lapisan.push({ dari: prev, sampai: Math.min(pkp, batas), tarif: l.tarif, dasar: kena, pajak: pph })
    pajak += pph; sisa -= kena; prev = batas
  }
  return { pajak, lapisan }
}

// ─── Cari TER dari tabel ─────────────────────────────────────────
function getTarifTer(bruto, tabel) {
  for (const r of tabel) if (bruto <= r.max) return r.tarif
  return tabel[tabel.length - 1].tarif
}

// ─── GROSS UP — iteratif ─────────────────────────────────────────
function hitungGrossUp(params) {
  let tp = 0
  for (let i = 0; i < 60; i++) {
    const p = { ...params, tunjanganLain: (params.tunjanganLain || 0) + tp }
    const { pph21Bulanan } = _progresifBulanan(p)
    if (Math.abs(pph21Bulanan - tp) < 1) break
    tp = pph21Bulanan
  }
  return tp
}

// ─── Helper: progresif bulanan (internal) ────────────────────────
function _progresifBulanan(params) {
  const { gajiPokok=0, tunjanganLain=0, iuranJabatan=0, iuranPensiun=0,
          ptkpKey='TK0', npwp=true, masa=12 } = params
  const ptkpNilai   = PTKP[ptkpKey]?.nilai ?? 54_000_000
  const brutoSebulan= gajiPokok + tunjanganLain
  const brutoSetahun= brutoSebulan * masa
  const bj          = Math.min(brutoSetahun * BIAYA_JABATAN_PCT, BIAYA_JABATAN_MAX)
  const ij          = iuranJabatan * masa
  const ip          = Math.min(iuranPensiun * masa, BIAYA_PENSIUN_MAX)
  const netto       = brutoSetahun - bj - ij - ip
  const pkp         = Math.max(0, Math.floor((netto - ptkpNilai) / 1000) * 1000)
  let { pajak, lapisan } = hitungProgresif(pkp)
  if (!npwp) pajak = Math.round(pajak * FAKTOR_NON_NPWP)
  const pph21Bulanan = Math.round(pajak / masa)
  return { pph21Bulanan, pajak, lapisan, brutoSebulan, brutoSetahun, bj, ij, ip, netto, ptkpNilai, pkp }
}

// ═══════════════════════════════════════════════════════════════════
// 1. KARYAWAN TETAP — TER (Jan–Nov)
// ═══════════════════════════════════════════════════════════════════
function hitungTetapTER(params) {
  const { gajiPokok=0, tunjanganLain=0, brutoSebelumnya=0,
          ptkpKey='TK0', npwp=true, metodePajak='gross', masa=1 } = params
  const terKat  = getTerKategori(ptkpKey, 'tetap')
  const tabel   = getTerTabel(terKat)
  const brutoSebulan = gajiPokok + tunjanganLain
  const tarifTer = getTarifTer(brutoSebulan, tabel)
  let pph21 = Math.round(brutoSebulan * tarifTer)
  if (!npwp) pph21 = Math.round(pph21 * FAKTOR_NON_NPWP)
  const thp = brutoSebulan - (metodePajak === 'gross' ? pph21 : 0)
  const brutoKumulatif = brutoSebelumnya + brutoSebulan

  return {
    metodePerhitungan: 'TER Bulanan',
    terKategori: terKat,
    tarifTer,
    brutoSebulan,
    brutoSebelumnya,
    brutoKumulatif,
    pph21Bulanan: pph21,
    thp,
    isGrossUp: false,
    ptkpDetail: PTKP[ptkpKey],
    breakdown: [
      { label:'Penghasilan Bruto Sebelumnya (akumulasi)',nilai:brutoSebelumnya },
      { label:'Gaji Pokok Bulan Ini',                   nilai:gajiPokok },
      { label:'Tunjangan Lain Bulan Ini',               nilai:tunjanganLain },
      { label:'Penghasilan Bruto Bulan Ini',            nilai:brutoSebulan, bold:true },
      { label:'Penghasilan Bruto Kumulatif s.d. Bulan Ini', nilai:brutoKumulatif, bold:true },
      { label:`Tarif TER Kat.${terKat} (${fmtPct(tarifTer)} × bruto)`, nilai:pph21, color:'red', bold:true },
      { label:'PPh 21 Dipotong Bulan Ini',              nilai:pph21, color:'red', bold:true },
      { label:'Take Home Pay (THP)',                    nilai:thp,  color:'green', bold:true },
    ],
  }
}

// ═══════════════════════════════════════════════════════════════════
// 2. KARYAWAN TETAP — Progresif (Desember / Rekonsiliasi)
// ═══════════════════════════════════════════════════════════════════
function hitungTetapProgresif(params) {
  const { gajiPokok=0, tunjanganLain=0, iuranJabatan=0, iuranPensiun=0,
          brutoSebelumnya=0, pph21Sebelumnya=0,
          ptkpKey='TK0', npwp=true, masa=12, metodePajak='gross' } = params

  const ptkpData    = PTKP[ptkpKey] ?? PTKP.TK0
  const ptkpNilai   = ptkpData.nilai
  const brutoSebulan= gajiPokok + tunjanganLain
  const brutoSetahun= brutoSebulan * masa
  const brutoKumulatif = brutoSebelumnya + brutoSebulan

  const bj  = Math.min(brutoSetahun * BIAYA_JABATAN_PCT, BIAYA_JABATAN_MAX)
  const ij  = iuranJabatan * masa
  const ip  = Math.min(iuranPensiun * masa, BIAYA_PENSIUN_MAX)
  const netto = brutoSetahun - bj - ij - ip
  const pkp   = Math.max(0, Math.floor((netto - ptkpNilai) / 1000) * 1000)

  let { pajak: pphSetahun, lapisan } = hitungProgresif(pkp)
  if (!npwp) pphSetahun = Math.round(pphSetahun * FAKTOR_NON_NPWP)

  const pph21BulanIni = Math.max(0, pphSetahun - pph21Sebelumnya)
  const pph21Bulanan  = Math.round(pphSetahun / masa)
  const thp = brutoSebulan - (metodePajak === 'gross' ? pph21BulanIni : 0)

  return {
    metodePerhitungan: 'Progresif Ps.17',
    brutoSebulan,
    brutoSebelumnya,
    brutoKumulatif,
    brutoSetahun,
    biayaJabatan: bj,
    iuranJabatanTahun: ij,
    iuranPensiunTahun: ip,
    netto,
    ptkpNilai,
    ptkpDetail: ptkpData,
    pkp,
    lapisan,
    pphSetahun,
    pph21Sebelumnya,
    pph21BulanIni,
    pph21Bulanan,
    thp,
    isGrossUp: false,
    breakdown: [
      { label:'Penghasilan Bruto Sebelumnya (Jan s.d. bulan lalu)', nilai:brutoSebelumnya },
      { label:'Gaji Pokok Bulan Ini',                               nilai:gajiPokok },
      { label:'Tunjangan Lain Bulan Ini',                           nilai:tunjanganLain },
      { label:'Penghasilan Bruto Bulan Ini',                        nilai:brutoSebulan, bold:true },
      { label:'Penghasilan Bruto Kumulatif',                        nilai:brutoKumulatif },
      { label:`Penghasilan Bruto Setahun (× ${masa} bulan)`,        nilai:brutoSetahun },
      { label:'(-) Biaya Jabatan 5% maks Rp 6 jt/thn',             nilai:bj, color:'amber' },
      { label:'(-) Iuran JHT/Jabatan (karyawan)',                   nilai:ij, color:'amber' },
      { label:'(-) Iuran Pensiun maks Rp 2,4 jt/thn',              nilai:ip, color:'amber' },
      { label:'Penghasilan Netto Setahun',                          nilai:netto, bold:true },
      { label:`(-) PTKP ${ptkpKey}`,                                nilai:ptkpNilai, color:'blue' },
      { label:'PKP (dibulatkan ke Rp 1.000)',                       nilai:pkp, bold:true },
      { label:'PPh 21 Setahun (Progresif Ps.17)',                   nilai:pphSetahun, color:'red', bold:true },
      { label:'(-) PPh 21 Sudah Dipotong Jan s.d. Bulan Lalu',      nilai:pph21Sebelumnya, color:'amber' },
      { label:'PPh 21 Terutang Bulan Ini',                          nilai:pph21BulanIni, color:'red', bold:true },
      { label:'Take Home Pay (THP)',                                 nilai:thp, color:'green', bold:true },
    ],
  }
}

// ═══════════════════════════════════════════════════════════════════
// 3. GROSS UP
// ═══════════════════════════════════════════════════════════════════
function hitungGrossUpFull(params) {
  const { gajiPokok=0, tunjanganLain=0, metodePerhitungan='ter', ptkpKey, npwp=true } = params
  const tunjanganPajak = hitungGrossUp(params)
  const paramsGU = { ...params, tunjanganLain: tunjanganLain + tunjanganPajak }

  const hasil = metodePerhitungan === 'ter'
    ? hitungTetapTER(paramsGU)
    : hitungTetapProgresif(paramsGU)

  hasil.isGrossUp      = true
  hasil.tunjanganPajak = tunjanganPajak
  hasil.brutoGrossUp   = gajiPokok + tunjanganLain + tunjanganPajak
  hasil.thp            = gajiPokok + tunjanganLain

  hasil.breakdown = [
    { label:'Gaji Pokok',                      nilai:gajiPokok },
    { label:'Tunjangan Lain-lain',             nilai:tunjanganLain },
    { label:'Tunjangan Pajak (Gross Up)',       nilai:tunjanganPajak, color:'purple', bold:true },
    { label:'Penghasilan Bruto Total',         nilai:hasil.brutoGrossUp, bold:true },
    { label:'PPh 21 (= Tunjangan Pajak)',      nilai:hasil.pph21Bulanan||hasil.pph21BulanIni, color:'red', bold:true },
    { label:'Take Home Pay (Gaji + Tunjangan)',nilai:hasil.thp, color:'green', bold:true },
  ]
  return hasil
}

// 4. KARYAWAN HARIAN / TIDAK TETAP
// ═══════════════════════════════════════════════════════════════════
function hitungHarian(params) {
  const { upahHarian=0, jumlahHari=1, npwp=true, brutoSebelumnya=0 } = params
  const tabel    = getTerTabel('C')
  const tarifTer = getTarifTer(upahHarian, tabel)
  let pph21Hari  = Math.round(upahHarian * tarifTer)
  if (!npwp) pph21Hari = Math.round(pph21Hari * FAKTOR_NON_NPWP)
  const upahTotal = upahHarian * jumlahHari
  const pph21Total= pph21Hari * jumlahHari
  const thp       = upahTotal - pph21Total
  const brutoKumulatif = brutoSebelumnya + upahTotal

  return {
    metodePerhitungan: 'TER Harian Kat.C',
    tarifTer,
    upahHarian,
    upahTotal,
    brutoSebelumnya,
    brutoKumulatif,
    pph21Harian: pph21Hari,
    pph21Bulanan: pph21Total,
    thp,
    breakdown: [
      { label:'Penghasilan Bruto Sebelumnya',  nilai:brutoSebelumnya },
      { label:'Upah Harian',                   nilai:upahHarian },
      { label:`Tarif TER Kat.C (${fmtPct(tarifTer)})`, nilai:pph21Hari, color:'red' },
      { label:'PPh 21 per Hari',               nilai:pph21Hari, bold:true, color:'red' },
      { label:`Jumlah Hari (${jumlahHari} hari)`, nilai:jumlahHari },
      { label:'Upah Total',                    nilai:upahTotal, bold:true },
      { label:'Penghasilan Bruto Kumulatif',   nilai:brutoKumulatif },
      { label:'PPh 21 Total',                  nilai:pph21Total, bold:true, color:'red' },
      { label:'Take Home Pay',                 nilai:thp, bold:true, color:'green' },
    ],
  }
}

// ═══════════════════════════════════════════════════════════════════
// 5. BUKAN KARYAWAN
// ═══════════════════════════════════════════════════════════════════
function hitungBukanKaryawan(params) {
  const { honorarium=0, skema='tidak_berkesimbg', ptkpKey='TK0', npwp=true, brutoSebelumnya=0 } = params
  const brutoKumulatif = brutoSebelumnya + honorarium
  let dpp, pph21, metodePerhitungan, lapisan = []

  if (skema === 'tidak_berkesimbg') {
    dpp  = honorarium * 0.50
    pph21= Math.round(dpp * 0.05)
    metodePerhitungan = 'Tidak Berkesinambungan (5% flat)'
  } else if (skema === '50persen') {
    dpp  = honorarium * 0.50
    const r = hitungProgresif(dpp)
    pph21 = Math.round(r.pajak); lapisan = r.lapisan
    metodePerhitungan = 'Berkesinambungan 50% × Progresif'
  } else { // berkesimbg_ptkp
    const ptkpBulan = (PTKP[ptkpKey]?.nilai ?? 54_000_000) / 12
    dpp  = Math.max(0, honorarium * 0.50 - ptkpBulan)
    const r = hitungProgresif(dpp)
    pph21 = Math.round(r.pajak); lapisan = r.lapisan
    metodePerhitungan = 'Berkesinambungan 50% × (Bruto–PTKP/12) × Progresif'
  }
  if (!npwp) pph21 = Math.round(pph21 * FAKTOR_NON_NPWP)
  const thp = honorarium - pph21

  return {
    metodePerhitungan,
    honorarium,
    dpp,
    brutoSebelumnya,
    brutoKumulatif,
    pph21Bulanan: pph21,
    lapisan,
    thp,
    breakdown: [
      { label:'Penghasilan Bruto Sebelumnya',  nilai:brutoSebelumnya },
      { label:'Honorarium Bruto',              nilai:honorarium, bold:true },
      { label:'Penghasilan Bruto Kumulatif',   nilai:brutoKumulatif },
      { label:'DPP (Dasar Pengenaan Pajak)',   nilai:dpp, bold:true },
      { label:'PPh 21',                        nilai:pph21, color:'red', bold:true },
      { label:'Take Home Pay',                 nilai:thp, color:'green', bold:true },
    ],
  }
}

// ═══════════════════════════════════════════════════════════════════
// 6. PENSIUN BERKALA
// ═══════════════════════════════════════════════════════════════════
function hitungPensiun(params) {
  const { pensiunBulanan=0, iuranPensiun=0, ptkpKey='TK0', npwp=true, masa=12, brutoSebelumnya=0 } = params
  const ptkpNilai  = PTKP[ptkpKey]?.nilai ?? 54_000_000
  const brutoSetahun = pensiunBulanan * masa
  const biayaPensiun = Math.min(brutoSetahun * BIAYA_PENSIUN_PCT, BIAYA_PENSIUN_MAX)
  const netto  = brutoSetahun - biayaPensiun - (iuranPensiun * masa)
  const pkp    = Math.max(0, Math.floor((netto - ptkpNilai) / 1000) * 1000)
  let { pajak, lapisan } = hitungProgresif(pkp)
  if (!npwp) pajak = Math.round(pajak * FAKTOR_NON_NPWP)
  const pph21Bulanan = Math.round(pajak / masa)
  const brutoKumulatif = brutoSebelumnya + pensiunBulanan

  return {
    metodePerhitungan: 'Pensiun Berkala (Progresif)',
    brutoSebelumnya, brutoKumulatif,
    brutoSebulan: pensiunBulanan, brutoSetahun,
    biayaPensiun, netto, ptkpNilai, pkp, lapisan,
    pphSetahun: pajak, pph21Bulanan, thp: pensiunBulanan - pph21Bulanan,
    breakdown: [
      { label:'Penghasilan Pensiun Sebelumnya', nilai:brutoSebelumnya },
      { label:'Uang Pensiun Bulanan',           nilai:pensiunBulanan, bold:true },
      { label:'Penghasilan Bruto Kumulatif',    nilai:brutoKumulatif },
      { label:`Pensiun Setahun (× ${masa})`,   nilai:brutoSetahun },
      { label:'(-) Biaya Pensiun 5% maks Rp 2,4 jt/thn', nilai:biayaPensiun, color:'amber' },
      { label:'(-) Iuran Pensiun',             nilai:iuranPensiun * masa, color:'amber' },
      { label:'Penghasilan Netto',             nilai:netto, bold:true },
      { label:`(-) PTKP ${ptkpKey}`,           nilai:ptkpNilai, color:'blue' },
      { label:'PKP',                           nilai:pkp, bold:true },
      { label:'PPh 21 Setahun',                nilai:pajak, color:'red', bold:true },
      { label:`PPh 21/bulan (÷${masa})`,       nilai:pph21Bulanan, color:'red', bold:true },
      { label:'Take Home Pay',                 nilai:pensiunBulanan - pph21Bulanan, color:'green', bold:true },
    ],
  }
}

// ═══════════════════════════════════════════════════════════════════
// 7. PESANGON / SEKALIGUS
// ═══════════════════════════════════════════════════════════════════
function hitungPesangon(params) {
  const { pesangon=0, npwp=true } = params
  let { pajak, lapisan } = hitungProgresif(pesangon, TARIF_PESANGON)
  if (!npwp) pajak = Math.round(pajak * FAKTOR_NON_NPWP)
  return {
    metodePerhitungan: 'Pesangon (PP 68/2009)',
    brutoSebulan: pesangon, brutoSebelumnya: 0, brutoKumulatif: pesangon,
    pph21Bulanan: pajak, lapisan, thp: pesangon - pajak,
    breakdown: [
      { label:'Uang Pesangon / Manfaat Pensiun', nilai:pesangon, bold:true },
      { label:'PPh 21 Final (tarif pesangon)',    nilai:pajak, color:'red', bold:true },
      { label:'Pesangon Diterima (netto)',        nilai:pesangon - pajak, color:'green', bold:true },
    ],
  }
}

// ═══════════════════════════════════════════════════════════════════
// 8. PNS / TNI / POLRI
// ═══════════════════════════════════════════════════════════════════
function hitungPNS(params) {
  const { gajiPokok=0, tunjanganLain=0, iuranPensiun=0, skema='pns_gaji',
          ptkpKey='TK0', npwp=true, masa=12, brutoSebelumnya=0 } = params
  const brutoSebulan = gajiPokok + tunjanganLain
  const brutoKumulatif = brutoSebelumnya + brutoSebulan

  if (skema === 'pns_honor') {
    const pph21 = Math.round(brutoSebulan * TARIF_PNS_HONOR)
    return {
      metodePerhitungan: 'Honorarium PNS 15% Final',
      brutoSebulan, brutoSebelumnya, brutoKumulatif,
      pph21Bulanan: pph21, thp: brutoSebulan - pph21,
      breakdown: [
        { label:'Penghasilan Bruto Sebelumnya', nilai:brutoSebelumnya },
        { label:'Honorarium',                  nilai:brutoSebulan, bold:true },
        { label:'Bruto Kumulatif',             nilai:brutoKumulatif },
        { label:'PPh 21 Final (15%)',          nilai:pph21, color:'red', bold:true },
        { label:'Diterima (netto)',            nilai:brutoSebulan - pph21, color:'green', bold:true },
      ],
    }
  }

  // Gaji PNS — progresif, ditanggung pemerintah
  const ptkpNilai   = PTKP[ptkpKey]?.nilai ?? 54_000_000
  const brutoSetahun= brutoSebulan * masa
  const bj = Math.min(brutoSetahun * BIAYA_JABATAN_PCT, BIAYA_JABATAN_MAX)
  const ip = Math.min(iuranPensiun * masa, BIAYA_PENSIUN_MAX)
  const netto = brutoSetahun - bj - ip
  const pkp   = Math.max(0, Math.floor((netto - ptkpNilai) / 1000) * 1000)
  let { pajak, lapisan } = hitungProgresif(pkp)
  if (!npwp) pajak = Math.round(pajak * FAKTOR_NON_NPWP)
  const pph21Bulanan = Math.round(pajak / masa)

  return {
    metodePerhitungan: 'PNS — Ditanggung Pemerintah (DTP)',
    brutoSebulan, brutoSebelumnya, brutoKumulatif,
    brutoSetahun, biayaJabatan: bj, iuranPensiunTahun: ip,
    netto, ptkpNilai, pkp, lapisan, pphSetahun: pajak, pph21Bulanan,
    thp: brutoSebulan, // THP = bruto (pajak ditanggung pemerintah)
    breakdown: [
      { label:'Penghasilan Bruto Sebelumnya',    nilai:brutoSebelumnya },
      { label:'Gaji Pokok + Tunjangan/bulan',    nilai:brutoSebulan, bold:true },
      { label:'Bruto Kumulatif',                 nilai:brutoKumulatif },
      { label:`Bruto Setahun (× ${masa})`,       nilai:brutoSetahun },
      { label:'(-) Biaya Jabatan 5%',            nilai:bj, color:'amber' },
      { label:'(-) Iuran Pensiun',               nilai:ip, color:'amber' },
      { label:'Penghasilan Netto Setahun',       nilai:netto, bold:true },
      { label:`(-) PTKP ${ptkpKey}`,             nilai:ptkpNilai, color:'blue' },
      { label:'PKP',                             nilai:pkp, bold:true },
      { label:'PPh 21 Setahun (ditanggung Pem.)', nilai:pajak, color:'red', bold:true },
      { label:'PPh 21/bulan',                    nilai:pph21Bulanan, color:'red', bold:true },
      { label:'Take Home Pay (pajak DTP)',        nilai:brutoSebulan, color:'green', bold:true },
    ],
  }
}

// 9. PPh 26 — WP Luar Negeri
// ═══════════════════════════════════════════════════════════════════
function hitungPPh26(params) {
  const { penghasilan=0, tarifP3B=0.20 } = params
  const pph26 = Math.round(penghasilan * tarifP3B)
  return {
    metodePerhitungan: `PPh 26 (tarif ${fmtPct(tarifP3B)})`,
    brutoSebulan: penghasilan, brutoSebelumnya: 0, brutoKumulatif: penghasilan,
    pph21Bulanan: pph26, thp: penghasilan - pph26,
    breakdown: [
      { label:'Penghasilan Bruto WP LN',         nilai:penghasilan, bold:true },
      { label:`PPh 26 (${fmtPct(tarifP3B)} × bruto)`, nilai:pph26, color:'red', bold:true },
      { label:'Penghasilan Netto (setelah PPh 26)', nilai:penghasilan - pph26, color:'green', bold:true },
    ],
  }
}

// ═══════════════════════════════════════════════════════════════════
// ENTRY POINT
// ═══════════════════════════════════════════════════════════════════
function hitungPPh21(params) {
  const { tipeKaryawan, metodePajak, metodePerhitungan } = params

  if (tipeKaryawan === 'harian')   return hitungHarian(params)
  if (tipeKaryawan === 'pensiun')  return hitungPensiun(params)
  if (tipeKaryawan === 'pesangon') return hitungPesangon(params)
  if (tipeKaryawan === 'pns')      return hitungPNS(params)
  if (tipeKaryawan === 'bukan_karyawan') return hitungBukanKaryawan(params)
  if (tipeKaryawan === 'mantan')   {
    const { honorarium=0, npwp=true } = params
    let { pajak, lapisan } = hitungProgresif(honorarium)
    if (!npwp) pajak = Math.round(pajak * FAKTOR_NON_NPWP)
    return { metodePerhitungan:'Mantan Pegawai (Progresif)', brutoSebulan:honorarium, brutoSebelumnya:0, brutoKumulatif:honorarium, pph21Bulanan:pajak, lapisan, thp:honorarium-pajak, breakdown:[{label:'Jasa Produksi / Bonus',nilai:honorarium,bold:true},{label:'PPh 21 (Progresif)',nilai:pajak,color:'red',bold:true},{label:'Diterima (netto)',nilai:honorarium-pajak,color:'green',bold:true}] }
  }
  if (tipeKaryawan === 'wp_ln')    return hitungPPh26(params)

  // Karyawan Tetap / Tidak Tetap
  if (metodePajak === 'gross_up')  return hitungGrossUpFull({ ...params, metodePerhitungan })

  return metodePerhitungan === 'ter'
    ? hitungTetapTER(params)
    : hitungTetapProgresif(params)
}

function safeSessionSet(key, value) {

function aboutMusicTimeLabel(seconds) {
  const safe = Math.max(0, Math.floor(seconds || 0));
  const m = Math.floor(safe / 60);
  const s = String(safe % 60).padStart(2, '0');
  return `${m}:${s}`;
}

function updateAboutMusicButton() {
  const btn = document.getElementById('aboutMusicBtn');
  if (!btn) return;
  const isPlaying = aboutMusicAudio && !aboutMusicAudio.paused && !aboutMusicAudio.ended;
  btn.classList.toggle('playing', !!isPlaying);
  btn.textContent = isPlaying
    ? `⏸ Music ${aboutMusicTimeLabel(aboutMusicAudio.currentTime)}`
    : '▶ Play Music';
}

function stopAboutMusic() {
  if (aboutMusicTimer) {
    clearInterval(aboutMusicTimer);
    aboutMusicTimer = null;
  }
  if (aboutMusicAudio) {
    try { aboutMusicAudio.pause(); } catch (e) {}
    try { aboutMusicAudio.currentTime = 0; } catch (e) {}
    try { aboutMusicAudio.volume = 0.82; } catch (e) {}
  }
  updateAboutMusicButton();
}

function startAboutMusic() {
  if (!aboutMusicAudio) {
    aboutMusicAudio = new Audio(ABOUT_MUSIC_SRC);
    aboutMusicAudio.preload = 'auto';
    aboutMusicAudio.volume = 0.82;
    aboutMusicAudio.addEventListener('ended', stopAboutMusic);
  }
  if (aboutMusicTimer) clearInterval(aboutMusicTimer);
  aboutMusicAudio.currentTime = 0;
  aboutMusicAudio.volume = 0.82;
  aboutMusicAudio.play().then(() => {
    updateAboutMusicButton();
    aboutMusicTimer = setInterval(() => {
      if (!aboutMusicAudio) return;
      if (aboutMusicAudio.currentTime >= ABOUT_MUSIC_LIMIT_SECONDS) {
        stopAboutMusic();
        return;
      }
      updateAboutMusicButton();
    }, 250);
  }).catch(() => {
    updateAboutMusicButton();
  });
}

function toggleAboutMusic() {
  if (aboutMusicAudio && !aboutMusicAudio.paused && !aboutMusicAudio.ended) stopAboutMusic();
  else startAboutMusic();
}

function initAboutMusicControls() {
  const btn = document.getElementById('aboutMusicBtn');
  if (!btn) return;
  btn.addEventListener('click', toggleAboutMusic);
  updateAboutMusicButton();
}

function startTutorial(steps, mode) {
  removeTutorialLayer(false);
  tutorialState.steps = steps;
  tutorialState.mode = mode;
  tutorialState.index = 0;
  tutorialState.active = true;
  document.body.classList.add('pajak-tour-open');
  renderTutorialStep();
}

function renderTutorialStep() {
  const step = tutorialState.steps[tutorialState.index];
  if (!step) { finishTutorial(); return; }
  let layer = document.getElementById('pajakTourLayer');
  if (!layer) {
    layer = document.createElement('div');
    layer.id = 'pajakTourLayer';
    document.body.appendChild(layer);
  }
  const dots = tutorialState.steps.length > 1
    ? `<div class="pajak-tour-progress">${tutorialState.steps.map((_, i) => `<span class="pajak-tour-dot ${i === tutorialState.index ? 'active' : ''}"></span>`).join('')}</div>`
    : '';
  const secondary = step.secondary
    ? `<button class="pajak-tour-skip" type="button" id="pajakTourSecondary">${esc(step.secondary)}</button>`
    : '';
  layer.className = `pajak-tour-layer tour-pos-${step.pos || 'center'}`;
  const visual = Array.isArray(step.images) && step.images.length
    ? `<div class="pajak-tour-member-anim" aria-hidden="true">${step.images.map(src => `<img src="${esc(src)}" alt="">`).join('')}</div>`
    : step.avatar
      ? `<div class="pajak-tour-member-avatar" aria-hidden="true"><span>${esc(step.avatar)}</span></div>`
      : `<img class="pajak-tour-mascot" src="${esc(step.img || BU_LAKSMI_IMAGES[0])}" alt="Bu Laksmi">`;
  layer.innerHTML = `
    <div class="pajak-tour-wrap" role="dialog" aria-live="polite" aria-label="Tutorial NgolahPajak">
      ${visual}
      <div class="pajak-tour-card ${Array.isArray(step.images) && step.images.length ? 'member-tour' : ''}">
        <div class="pajak-tour-kicker">${esc(step.kicker || 'Tutorial')}</div>
        <h2>${step.title || ''}</h2>
        ${step.memberMeta ? `<div class="pajak-tour-member-meta">${esc(step.memberMeta)}</div>` : ''}
        <p>${step.text || ''}</p>
        ${dots}
        <div class="pajak-tour-actions">
          ${secondary}
          <button class="pajak-tour-next" type="button" id="pajakTourNext">${esc(step.primary || 'Lanjut')}</button>
        </div>
      </div>
    </div>`;
  const nextBtn = document.getElementById('pajakTourNext');
  const secondaryBtn = document.getElementById('pajakTourSecondary');
  if (nextBtn) nextBtn.addEventListener('click', () => {
    if (typeof step.nextAction === 'function') {
      step.nextAction();
      return;
    }
    tutorialState.index += 1;
    if (tutorialState.index >= tutorialState.steps.length) finishTutorial();
    else renderTutorialStep();
  });
  if (secondaryBtn) secondaryBtn.addEventListener('click', () => {
    if (typeof step.secondaryAction === 'function') step.secondaryAction();
    else finishTutorial();
  });
}

function finishTutorial() {
  if (tutorialState.mode === 'dashboard') tutorialState.dashboardDone = true;
  else tutorialState.loginDone = true;
  removeTutorialLayer(true);
}

function removeTutorialLayer(markInactive) {
  const layer = document.getElementById('pajakTourLayer');

  try {

  try {

function renderPPh21() {

    setPage('dashboard');
  });
  const frame = document.getElementById('pph21Frame');
  let pph21ResizeObserver = null;
  const resizeFrame = () => {
    if (!frame) return;
    try {
      const doc = frame.contentDocument || frame.contentWindow.document;
      const win = frame.contentWindow;
      const wrap = doc.querySelector('.wrap');
      let height = 0;

      if (wrap) {
        const rect = wrap.getBoundingClientRect();
        const wrapStyle = win.getComputedStyle(wrap);
        const marginBottom = parseFloat(wrapStyle.marginBottom || '0') || 0;
        height = Math.ceil(rect.top + wrap.scrollHeight + marginBottom);
      }

      if (!height && doc.body) {
        const children = Array.from(doc.body.children || []).filter(el => {
          if (!el || !el.getBoundingClientRect) return false;
          if (el.classList && el.classList.contains('backToMainApp')) return false;
          const tag = (el.tagName || '').toLowerCase();
          return tag !== 'script' && tag !== 'style';
        });
        height = Math.ceil(children.reduce((max, el) => {
          const r = el.getBoundingClientRect();
          return Math.max(max, r.bottom);
        }, 0));
      }

      // v45: tinggi iframe PPh 21 dibuat mengikuti konten aktif.
      // Sebelumnya minimum 900px membuat tab Pegawai Tak Tetap dan PPh 21 Lainnya
      // menyisakan ruang kosong panjang di bawah konten.
      frame.style.height = Math.max(height + 4, 280) + 'px';
    } catch (e) {
      // Local offline file: fallback height is already set in CSS.
    }
  };
  if (frame) {
    frame.addEventListener('load', () => {
      applyEmbeddedFrameTheme(frame);
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        const innerBack = doc.querySelector('.backToMainApp');
        if (innerBack) innerBack.style.display = 'none';
        if (doc.body) doc.body.classList.add('embedded-mode');
      } catch (e) {}
      resizeFrame();
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        const wrap = doc.querySelector('.wrap');
        if (pph21ResizeObserver) pph21ResizeObserver.disconnect();
        pph21ResizeObserver = new ResizeObserver(() => requestAnimationFrame(resizeFrame));
        if (wrap) pph21ResizeObserver.observe(wrap);
        if (doc.body) pph21ResizeObserver.observe(doc.body);
        doc.querySelectorAll('#tab_tetap,#tab_tak,#tab_lain').forEach(btn => {
          btn.addEventListener('click', () => {
            requestAnimationFrame(resizeFrame);
            setTimeout(resizeFrame, 80);
            setTimeout(resizeFrame, 220);
          });
        });
        window.addEventListener('resize', resizeFrame);
      } catch (e) {}
    });
  }
}


function resizeEmbeddedCalculatorFrame(frame, minHeight = 280) {
  if (!frame) return;
  try {
    const doc = frame.contentDocument || frame.contentWindow.document;
    const win = frame.contentWindow;
    const wrap = doc.querySelector('.wrap');
    let height = 0;

    if (wrap) {
      const rect = wrap.getBoundingClientRect();
      const style = win.getComputedStyle(wrap);
      const marginBottom = parseFloat(style.marginBottom || '0') || 0;
      height = Math.ceil(rect.top + wrap.scrollHeight + marginBottom);
    }

    if (!height && doc.body) {
      const children = Array.from(doc.body.children || []).filter(el => {
        const tag = (el.tagName || '').toLowerCase();
        return tag !== 'script' && tag !== 'style';
      });
      height = Math.ceil(children.reduce((max, el) => {
        if (!el.getBoundingClientRect) return max;
        const r = el.getBoundingClientRect();
        return Math.max(max, r.bottom);
      }, 0));
    }

    frame.style.height = Math.max(height + 4, minHeight) + 'px';
  } catch (e) {
    // Local/offline fallback height is already set in CSS.
  }
}

function attachEmbeddedCalculatorAutoResize(frame, minHeight = 280) {
  if (!frame) return;
  const resize = () => resizeEmbeddedCalculatorFrame(frame, minHeight);
  frame.addEventListener('load', () => {
    applyEmbeddedFrameTheme(frame);
    resize();
    try {
      const doc = frame.contentDocument || frame.contentWindow.document;
      const wrap = doc.querySelector('.wrap');
      const ro = new ResizeObserver(() => requestAnimationFrame(resize));
      frame._ngolahResizeObserver = ro;
      if (wrap) ro.observe(wrap);
      if (doc.body) ro.observe(doc.body);
      doc.addEventListener('input', () => requestAnimationFrame(resize), true);
      doc.addEventListener('change', () => setTimeout(resize, 50), true);
      doc.addEventListener('click', () => {
        requestAnimationFrame(resize);
        setTimeout(resize, 90);
        setTimeout(resize, 260);
      }, true);
      window.addEventListener('resize', resize);
    } catch (e) {}
  });
}

  wireBack();
  const detailDiv = document.getElementById('p23Detail');
  const kodeEl = document.getElementById('p23Kode');
  kodeEl.addEventListener('change', () => {
    const idx = kodeEl.value;
    state.pph23Detail = idx === '' ? null : PPH23_OPTIONS[Number(idx)];
    state.pph23Result = null; state.pph23Error = '';
    if (state.pph23Detail) detailDiv.innerHTML = detailCardHTML(state.pph23Detail); else detailDiv.innerHTML = '';
    document.getElementById('p23ResultWrap').innerHTML = '';
  });
  document.getElementById('p23Currency').addEventListener('change', e => document.getElementById('kursWrap').classList.toggle('hidden', e.target.value === 'IDR'));
  document.getElementById('p23Calc').addEventListener('click', () => {
    const o = state.pph23Detail;
    if (!o) { state.pph23Error = '⚠ Pilih kode objek pajak terlebih dahulu.'; renderPPh23(); return; }
    const rawBruto = parseFloat(val('p23Bruto'));
    if (!rawBruto || rawBruto <= 0) { state.pph23Error = '⚠ Masukkan penghasilan bruto yang valid.'; renderPPh23(); return; }
    let brutoIDR = rawBruto;
    const currency = val('p23Currency');
    if (currency !== 'IDR') {
      const kursVal = parseFloat(val('p23Kurs'));
      if (!kursVal || kursVal <= 0) { state.pph23Error = '⚠ Masukkan kurs KMK untuk valas.'; renderPPh23(); return; }
      brutoIDR = rawBruto * kursVal;
    }
    const tarifN = o.tarif;
    const tarifE = val('p23Npwp') === 'tidak' ? tarifN * 2 : tarifN;
    const pph = brutoIDR * (tarifE / 100);
    const neto = brutoIDR - pph;
    state.pph23Error = '';
    state.pph23Result = { brutoIDR, rawBruto, tarifN, tarifE, pph, neto, currency, npwp: val('p23Npwp') };
    document.getElementById('p23ResultWrap').innerHTML = pph23ResultHTML();
  });
}

function detailCardHTML(o) {
  return `<div class="detail-box"><div><b class="badge purple">${esc(o.kode)}</b><b class="badge ${o.tarif==15?'rose-bg':'green-bg'}">Tarif ${esc(o.tarif)}%</b></div><p><b>${esc(o.nama)}</b> — ${esc(o.ket)}</p><small>Dasar hukum: ${esc(o.hk)}</small></div>`;
}
function pph23ResultHTML() {
  const h = state.pph23Result, o = state.pph23Detail;
  if (!h || !o) return '';
  return `<div class="card result-pph23">
    <div class="blue-head"><div><small>PPh 23 Dipotong</small><b>${fmt(h.pph)}</b></div><div><small>Neto Diterima</small><b>${fmt(h.neto)}</b></div></div>
    <div class="result-grid"><p><small>Kode Objek Pajak</small><b>${esc(o.kode)}</b></p><p><small>Jenis Objek</small><b>${esc(o.nama)}</b></p><p><small>Tarif Normal</small><b>${esc(h.tarifN)}%</b></p><p><small>Tarif Efektif</small><b>${esc(h.tarifE)}%</b></p><p class="wide"><small>Penghasilan Bruto (IDR)</small><b>${fmt(h.brutoIDR)} ${h.currency !== 'IDR' ? `<span>(${esc(h.currency)} ${fmtPlain(h.rawBruto)})</span>` : ''}</b></p></div>
    <p class="formula">Rumus: ${esc(h.tarifE)}% × ${fmt(h.brutoIDR)} = ${fmt(h.pph)}</p>
  </div>`;
}

render();

  </script>
</body>
</html>
